{% extends 'index.html' %}

{% block title %}
<title>重置密码</title>
{% endblock %}

{% block header_right %}
{% endblock %}

{% block nav %}
{% endblock %}

{% block main %}
<div class="auth-form-container ">
    <div class="auth-warning">
        <span></span>
        <i class=""></i>
    </div>

    <form id="reset-password-form" class="auth-form">
        <div class="auth-form-group">
            <label class="form-label" for="auth-form-username">用户名</label>
            <input class="form-input" id="auth-form-username" type="text" name="username" autocomplete="username" required>
        </div>

        <div class="auth-form-group">
            <label class="form-label" for="register-code">验证码</label>
            <input class="form-input" id="register-code" type="text" name="register-code" required>
        </div>

        <div class="auth-form-group">
            <button type="submit">重置密码</button>
        </div>

    </form>

    <div class="divider-container">
        <span class="divider-line"></span>
        <span class="divider-text">or</span>
        <span class="divider-line"></span>
    </div>

    <div class="auth-footer-link">
        <span>新用户?</span>
        <a href="/auth/register">点击注册</a>
    </div>

    <div class="auth-footer-link">
        <span>已有账号?</span>
        <a href="/auth/login">点击登录</a>
    </div>


</div>
{% endblock %}

{% block scripts %}
    <script src="/static/js/auth.js"></script>
{% endblock %}
