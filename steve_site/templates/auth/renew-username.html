{% extends 'index.html' %}

{% block title %}
<title>更新用户名</title>
{% endblock %}

{% block header_right %}
{% endblock %}

{% block nav %}
{% endblock %}

{% block main %}
<div class="auth-form-container ">
    <div class="auth-warning">
        <span></span>
        <i class=""></i>
    </div>

    <form id="renew-username-form" class="auth-form">
        <div class="auth-form-group">
            <label class="form-label" for="auth-form-username">新用户名</label>
            <input class="form-input" id="auth-form-username" type="text" name="username" autocomplete="username" required>
        </div>

        <div class="auth-form-group">
            <button type="submit">提交</button>
        </div>

    </form>
</div>
{% endblock %}

{% block scripts %}
    <script src="/static/js/auth.js"></script>
{% endblock %}
